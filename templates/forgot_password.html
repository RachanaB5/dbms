{% extends "base.html" %}
{% block title %}Reset Password - curiocart{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">Forgot / Reset Password</div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('forgot_password') }}">
                    <div class="form-group">
                        <label for="email">Enter Registered Email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Enter New Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary">Reset Password</button>
                </form>
                <div style="text-align: center; margin-top: 1.5rem;">
                    <a href="{{ url_for('show_login') }}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
