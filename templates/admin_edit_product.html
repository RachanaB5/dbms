{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center" style="min-height: 80vh; padding: 4rem 1rem;">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header"><i class="fas fa-edit"></i> Edit Product #{{ product.id }}</div>
            <div class="card-body">
                <form method="POST">
                    <div class="form-group">
                        <label for="name">Product Name</label>
                        <input type="text" id="name" name="name" class="form-control" value="{{ product.name }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="brand">Brand</label>
                        <input type="text" id="brand" name="brand" class="form-control" value="{{ product.brand or '' }}" required placeholder="e.g. ApexTech">
                    </div>
                    
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" class="form-control" rows="4" style="resize: none;" required>{{ product.description }}</textarea>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label for="price">Price (₹)</label>
                            <input type="number" id="price" name="price" step="0.01" class="form-control" value="{{ product.price }}" required>
                        </div>
                        <div class="form-group">
                            <label for="stock_quantity">Stock Quantity</label>
                            <input type="number" id="stock_quantity" name="stock_quantity" class="form-control" value="{{ product.stock_quantity }}" required>
                        </div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 15px;">
                        <div class="form-group">
                            <label for="image">Image Name</label>
                            <input type="text" id="image" name="image" class="form-control" value="{{ product.image }}" required>
                        </div>
                        <div class="form-group">
                            <label for="discount">Discount %</label>
                            <input type="number" id="discount" name="discount" class="form-control" min="0" max="99" value="{{ product.discount or 0 }}">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" name="category" class="form-control" required style="padding: 0.5rem 1rem;">
                            <option value="">Select Category</option>
                            <option value="Electronics" {% if product.category == 'Electronics' %}selected{% endif %}>Electronics</option>
                            <option value="Fashion" {% if product.category == 'Fashion' %}selected{% endif %}>Fashion</option>
                            <option value="Home & Kitchen" {% if product.category == 'Home & Kitchen' %}selected{% endif %}>Home & Kitchen</option>
                            <option value="Beauty" {% if product.category == 'Beauty' %}selected{% endif %}>Beauty</option>
                            <option value="Books" {% if product.category == 'Books' %}selected{% endif %}>Books</option>
                            <option value="Gadgets" {% if product.category == 'Gadgets' %}selected{% endif %}>Gadgets</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="specifications">Specs (JSON Format)</label>
                        <textarea id="specifications" name="specifications" class="form-control" rows="4" placeholder='e.g. {"Key1": "Val1", "Key2": "Val2"}' style="resize: none; font-family: monospace; font-size: 0.85rem;">{{ product.specifications or '' }}</textarea>
                    </div>
                    
                    <div style="display: flex; gap: 15px; margin-top: 1.5rem;">
                        <button type="submit" class="btn-primary" style="margin: 0; flex: 1.5;">Update Product</button>
                        <a href="{{ url_for('admin') }}" class="btn-primary" style="margin: 0; flex: 1; text-align: center; text-decoration: none; background: var(--secondary); display: flex; align-items: center; justify-content: center;">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
